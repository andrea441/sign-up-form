<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="left-panel">
      <div class="logo-section">
        <img src="images/odin-logo.png" alt="The Odin Project logo" />
        <span>Odin</span>
      </div>
    </div>

    <div class="right-panel">
      <div class="header-section">
        <p>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams. Sign up
          <em>now</em>
          to get started.
        </p>
        <p>You <em>know</em> you want to.</p>
      </div>

      <form id="form-section" action="">
        <p>Lets do this!</p>

        <label for="first-name">First Name</label>
        <input type="text" name="first-name" id="first-name" />
        <label for="last-name">Last Name</label>
        <input type="text" name="last-name" id="last-name" />
        <label for="email">Email</label>
        <input type="email" name="email" id="email" />
        <label for="phone">Phone number</label>
        <input type="tel" name="phone" id="phone" />
        <label for="password">Password</label>
        <input type="password" name="password" id="password" />
        <label for="confirm-password">Confirm password</label>
        <input type="password" name="confirm-password" id="confirm-password" />
      </form>

      <div class="submit-section">
        <button type="submit" form="form-section">Create Account</button>
        <p>Already have an account? <a href="">Log in</a></p>
      </div>
    </div>
  </body>
</html>
